<div class="glass-card">
  <div class="section-header">
    <h3>Transfer Funds</h3>
  </div>

  <div class="error-banner" *ngIf="error">{{ error }}</div>
  <div class="success-banner" *ngIf="success">{{ success }}</div>

  <form (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>From Wallet</label>
      <select class="form-control" name="sourceWalletId" [(ngModel)]="sourceWalletId" required>
        <option *ngFor="let w of wallets" [value]="w.id">
          {{ w.currency }} (Balance: {{ w.balance | number:'1.2-2' }})
        </option>
      </select>
    </div>

    <div class="form-group">
      <label>To Wallet ID</label>
      <input type="number" class="form-control" name="targetWalletId" [(ngModel)]="targetWalletId" placeholder="Enter recipient wallet ID" required>
    </div>

    <div class="form-group">
      <label>Amount</label>
      <input type="number" class="form-control" name="amount" [(ngModel)]="amount" placeholder="0.00" min="0.01" step="0.01" required>
    </div>

    <button type="submit" class="btn-primary w-100 mt-10" [disabled]="loading || wallets.length === 0">
      {{ loading ? 'Processing...' : 'Send Funds' }}
    </button>
  </form>
</div>
