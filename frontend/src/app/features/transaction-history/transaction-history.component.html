<div class="glass-card">
  <div class="section-header">
    <h3>Recent Transactions</h3>
    <button class="btn-primary btn-sm" (click)="loadHistory()">Refresh</button>
  </div>

  <div *ngIf="loading" class="text-muted mt-20">Loading transactions...</div>

  <div *ngIf="!loading && transactions.length === 0" class="text-muted mt-20">
    No recent activity found.
  </div>

  <div class="table-container" *ngIf="!loading && transactions.length > 0">
    <table class="data-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Type</th>
          <th>Amount</th>
          <th>Status</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let t of transactions">
          <td>#{{ t.id }}</td>
          <td>
            <span class="badge badge-type">{{ t.transactionType || 'TRANSFER' }}</span>
          </td>
          <td class="amount-col">
            {{ t.baseAmount | number:'1.2-2' }} <span class="currency-label">{{ t.baseCurrency }}</span>
          </td>
          <td>
            <span class="badge" [ngClass]="'status-' + (t.status ? t.status.toLowerCase() : 'unknown')">
              {{ t.status }}
            </span>
          </td>
          <td>{{ t.createdAt | date:'medium' }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
