<div class="auth-container">
  <div class="glass-card auth-card">
    <h2 class="text-gradient">{{ isLogin ? 'Welcome Back' : 'Create Account' }}</h2>
    <p class="subtitle">{{ isLogin ? 'Sign in to access your wallets' : 'Join to start making transfers' }}</p>

    <div class="error-banner" *ngIf="error">
      {{ error }}
    </div>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" class="form-control" name="email" [(ngModel)]="email" placeholder="you@example.com" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" class="form-control" name="password" [(ngModel)]="password" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn-primary w-100" [disabled]="loading">
        {{ loading ? 'Processing...' : (isLogin ? 'Sign In' : 'Sign Up') }}
      </button>
    </form>

    <div class="toggle-mode">
      <p>
        {{ isLogin ? "Don't have an account?" : "Already have an account?" }}
        <a href="javascript:void(0)" (click)="toggleMode()">
          {{ isLogin ? 'Register now' : 'Log in instead' }}
        </a>
      </p>
    </div>
  </div>
</div>
